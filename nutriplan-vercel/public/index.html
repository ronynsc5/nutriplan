<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPlan - Seu Plano Nutricional Personalizado</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            background: #f0f0f0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .form-content {
            display: none;
        }
        
        .form-content.active {
            display: block;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        /* ═══════════════════════════════════════════════════════════ */
        /* CAMPO WHATSAPP COM PREFIXO +55 */
        /* ═══════════════════════════════════════════════════════════ */
        .input-phone {
            display: flex;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            transition: border 0.3s;
        }
        
        .input-phone:focus-within {
            border-color: #667eea;
        }
        
        .input-phone .prefix {
            padding: 12px 15px;
            background: #f5f5f5;
            color: #666;
            font-weight: 600;
            display: flex;
            align-items: center;
            border-right: 2px solid #e0e0e0;
        }
        
        .input-phone input {
            border: none !important;
            padding: 12px;
            flex: 1;
        }
        
        .input-phone input:focus {
            outline: none;
        }
        
        .small-text {
            font-size: 0.85em;
            color: #666;
            margin-top: 5px;
        }
        
        button[type="submit"] {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        button[type="submit"]:active {
            transform: translateY(0);
        }
        
        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .message.show {
            display: block;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥗 NutriPlan</h1>
        <p class="subtitle">Seu plano nutricional personalizado com IA</p>

        <div class="tabs">
            <button class="tab active" onclick="showTab('login')">Entrar</button>
            <button class="tab" onclick="showTab('cadastro')">Cadastrar</button>
        </div>

        <div id="message" class="message"></div>

        <!-- ════════════════════════════════════════════════════════════ -->
        <!-- FORMULÁRIO DE LOGIN -->
        <!-- ════════════════════════════════════════════════════════════ -->
        <form id="login-form" class="form-content active">
            <div class="input-group">
                <label for="login-identificador">Email ou WhatsApp</label>
                <input 
                    type="text" 
                    id="login-identificador" 
                    placeholder="seu@email.com ou 21999999999"
                    required
                >
                <p class="small-text">Digite seu email ou WhatsApp (apenas números)</p>
            </div>

            <div class="input-group">
                <label for="login-senha">Senha</label>
                <input 
                    type="password" 
                    id="login-senha" 
                    placeholder="••••••••"
                    required
                >
            </div>

            <button type="submit">Entrar</button>
        </form>

        <!-- ════════════════════════════════════════════════════════════ -->
        <!-- FORMULÁRIO DE CADASTRO -->
        <!-- ════════════════════════════════════════════════════════════ -->
        <form id="cadastro-form" class="form-content">
            <div class="input-group">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" placeholder="João Silva" required>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>

            <!-- ═══════════════════════════════════════════════════════ -->
            <!-- CAMPO WHATSAPP (NOVO!) -->
            <!-- ═══════════════════════════════════════════════════════ -->
            <div class="input-group">
                <label for="whatsapp">WhatsApp</label>
                <div class="input-phone">
                    <span class="prefix">+55</span>
                    <input 
                        type="tel" 
                        id="whatsapp" 
                        placeholder="21999999999"
                        maxlength="11"
                        required
                    >
                </div>
                <p class="small-text">DDD + número (será usado para automações e lembretes)</p>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Mínimo 6 caracteres" minlength="6" required>
            </div>

            <button type="submit">Cadastrar</button>
        </form>
    </div>

    <script>
        // ════════════════════════════════════════════════════════════
        // ALTERNAR ABAS
        // ════════════════════════════════════════════════════════════
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-content').forEach(f => f.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-form').classList.add('active');
            hideMessage();
        }

        // ════════════════════════════════════════════════════════════
        // MENSAGENS
        // ════════════════════════════════════════════════════════════
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type} show`;
            setTimeout(() => msg.classList.remove('show'), 5000);
        }

        function hideMessage() {
            document.getElementById('message').classList.remove('show');
        }

        // ════════════════════════════════════════════════════════════
        // VALIDAR WHATSAPP (SÓ NÚMEROS)
        // ════════════════════════════════════════════════════════════
        document.getElementById('whatsapp').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
        });

        // ════════════════════════════════════════════════════════════
        // LOGIN (EMAIL OU WHATSAPP)
        // ════════════════════════════════════════════════════════════
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const identificador = document.getElementById('login-identificador').value.trim();
            const senha = document.getElementById('login-senha').value;
            
            // Detectar se é email ou whatsapp
            const isEmail = identificador.includes('@');
            const isWhatsApp = /^\d{10,11}$/.test(identificador);
            
            if (!isEmail && !isWhatsApp) {
                showMessage('Digite um email válido ou WhatsApp (apenas números)', 'error');
                return;
            }

            const dados = {
                senha: senha
            };

            if (isWhatsApp) {
                dados.whatsapp = '55' + identificador; // Adiciona código do Brasil
            } else {
                dados.email = identificador;
            }

            try {
                const response = await fetch('/api/usuarios?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data));
                    showMessage('Login realizado! Redirecionando...', 'success');
                    setTimeout(() => {
                        window.location.reload();
                    }, 1500);
                } else {
                    showMessage(data.error || 'Erro ao fazer login', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão. Tente novamente.', 'error');
                console.error(error);
            }
        });

        // ════════════════════════════════════════════════════════════
        // CADASTRO (COM WHATSAPP)
        // ════════════════════════════════════════════════════════════
        document.getElementById('cadastro-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const whatsappInput = document.getElementById('whatsapp').value.trim();
            
            // Validar WhatsApp
            if (whatsappInput.length !== 11) {
                showMessage('WhatsApp deve ter 11 dígitos (DDD + número)', 'error');
                return;
            }

            const dados = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                senha: document.getElementById('senha').value,
                whatsapp: '55' + whatsappInput // Adiciona código do Brasil (55)
            };

            try {
                const response = await fetch('/api/usuarios?action=cadastrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data));
                    showMessage('Cadastro realizado! Bem-vindo(a)! 🎉', 'success');
                    setTimeout(() => {
                        window.location.reload();
                    }, 2000);
                } else {
                    showMessage(data.error || 'Erro ao cadastrar', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão. Tente novamente.', 'error');
                console.error(error);
            }
        });
    </script>
</body>
</html>
