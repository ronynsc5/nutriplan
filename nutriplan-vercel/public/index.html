<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NutriPlan">
<meta property="og:title" content="NutriPlan — MFCT Estúdio">
<meta property="og:description" content="Plano alimentar com IA + Instagram Fitness">
<meta property="og:image" content="/img-saudavel.png">
<title>NutriPlan — MFCT Estúdio</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,700&family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ═══════════ TOKENS ═══════════ */
[data-theme="light"]{
  --bg:#F0EDE8;
  --card:#FFFFFF;
  --preto:#0D0C0A;
  --texto:#1C1A17;
  --cinza-med:#6B6560;
  --cinza-cla:#D8D2C8;
  --cinza-bg:#E8E3DC;
  --sombra:0 2px 24px rgba(13,12,10,0.10);
  --sombra-lg:0 8px 48px rgba(13,12,10,0.15);
  --acento:#C8432A;
  --acento-bg:#FFF0EE;
  --verde:#1E7A3C;
  --verde-bg:#E8F5EE;
  --border:rgba(13,12,10,0.12);
}
[data-theme="dark"]{
  --bg:#0A0908;
  --card:#1A1815;
  --preto:#EDEAE4;
  --texto:#C8C2BA;
  --cinza-med:#7A7670;
  --cinza-cla:#2E2A25;
  --cinza-bg:#211E1A;
  --sombra:0 2px 24px rgba(0,0,0,0.4);
  --sombra-lg:0 8px 48px rgba(0,0,0,0.6);
  --acento:#E05A3E;
  --acento-bg:#2A1410;
  --verde:#3DAF62;
  --verde-bg:#0E2118;
  --border:rgba(237,234,228,0.08);
}

:root{
  --radius:20px;
  --radius-sm:12px;
  --radius-xs:8px;
  --bottom-h:72px;
  --nav-h:58px;
  --font-display:'Fraunces',serif;
  --font-ui:'Syne',sans-serif;
  --font-mono:'DM Mono',monospace;
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
  --ease-out:cubic-bezier(0.22,1,0.36,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{
  font-family:var(--font-ui);
  background:var(--bg);
  color:var(--texto);
  min-height:100vh;
  overflow-x:hidden;
  padding-bottom:var(--bottom-h);
  -webkit-font-smoothing:antialiased;
}

/* ═══════════ ANIMAÇÕES DE ENTRADA ═══════════ */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}
@keyframes scaleIn{
  from{opacity:0;transform:scale(0.92);}
  to{opacity:1;transform:scale(1);}
}
@keyframes slideDown{
  from{opacity:0;transform:translateY(-12px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes shimmer{
  0%{background-position:-200% 0;}
  100%{background-position:200% 0;}
}
@keyframes pulse-ring{
  0%{transform:scale(1);opacity:0.6;}
  50%{transform:scale(1.08);opacity:0.3;}
  100%{transform:scale(1);opacity:0.6;}
}
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

.anim-up{animation:fadeUp 0.6s var(--ease-out) both;}
.anim-up-1{animation:fadeUp 0.6s 0.1s var(--ease-out) both;}
.anim-up-2{animation:fadeUp 0.6s 0.2s var(--ease-out) both;}
.anim-up-3{animation:fadeUp 0.6s 0.3s var(--ease-out) both;}
.anim-up-4{animation:fadeUp 0.6s 0.4s var(--ease-out) both;}
.anim-scale{animation:scaleIn 0.5s var(--ease-spring) both;}

/* ═══════════ NAVEGAÇÃO ═══════════ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:rgba(253,251,248,0.88);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--border);
  padding:0 1.2rem;
  display:flex;align-items:center;justify-content:space-between;
  height:var(--nav-h);
  animation:slideDown 0.5s var(--ease-out) both;
}
[data-theme="dark"] nav{background:rgba(13,12,10,0.88);}

.logo{
  font-family:var(--font-display);
  font-size:1.15rem;
  font-weight:700;
  color:var(--preto);
  display:flex;align-items:baseline;gap:8px;
  letter-spacing:-0.02em;
}
.logo-badge{
  font-family:var(--font-mono);
  font-size:0.5rem;
  color:var(--cinza-med);
  letter-spacing:0.15em;
  text-transform:uppercase;
  background:var(--cinza-bg);
  border:1px solid var(--cinza-cla);
  border-radius:50px;
  padding:2px 7px;
  margin-bottom:2px;
}
.nav-right{display:flex;align-items:center;gap:6px;}

.nav-btn{
  background:var(--preto);
  color:var(--bg);
  border:none;border-radius:50px;
  padding:8px 16px;
  font-family:var(--font-ui);
  font-size:0.78rem;font-weight:600;
  cursor:pointer;
  transition:transform 0.15s var(--ease-spring),opacity 0.15s;
  letter-spacing:0.01em;
}
.nav-btn:hover{transform:scale(1.04);}
.nav-btn:active{transform:scale(0.96);}
.nav-btn.sec{
  background:transparent;color:var(--preto);
  border:1.5px solid var(--cinza-cla);
}
.btn-tema{
  background:var(--cinza-bg);
  border:1px solid var(--cinza-cla);
  border-radius:50%;
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  font-size:0.9rem;cursor:pointer;
  transition:transform 0.2s var(--ease-spring),background 0.2s;
}
.btn-tema:hover{transform:rotate(20deg) scale(1.1);}

/* ═══════════ BOTTOM NAV ═══════════ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(253,251,248,0.94);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-top:1px solid var(--border);
  height:var(--bottom-h);
  display:none;align-items:center;justify-content:space-around;
  padding-bottom:env(safe-area-inset-bottom);
}
[data-theme="dark"] .bottom-nav{background:rgba(13,12,10,0.94);}
.bottom-nav.show{display:flex;}

.bnav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;padding:6px 14px;
  border-radius:var(--radius-xs);
  background:none;border:none;
  font-family:var(--font-ui);
  min-width:52px;
  transition:transform 0.2s var(--ease-spring);
  position:relative;
}
.bnav-item:active{transform:scale(0.88);}
.bnav-item .icon{font-size:1.3rem;transition:transform 0.2s var(--ease-spring);}
.bnav-item .label{font-size:0.58rem;color:var(--cinza-med);font-weight:600;letter-spacing:0.05em;text-transform:uppercase;}
.bnav-item.active .label{color:var(--preto);}
.bnav-item.active .icon{transform:scale(1.15);}
.bnav-item.active::before{
  content:'';
  position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  width:28px;height:3px;
  background:var(--preto);
  border-radius:0 0 4px 4px;
}

/* ═══════════ TELAS ═══════════ */
.tela{display:none;padding-top:var(--nav-h);min-height:100vh;}
.tela.ativa{display:block;}
#tela-hero{display:none;flex-direction:column;min-height:100vh;padding-top:var(--nav-h);}
#tela-hero.ativa{display:flex;}

/* ═══════════ HERO ═══════════ */
.hero-bg{
  background:var(--preto);
  color:var(--bg);
  padding:2.5rem 1.4rem 3.5rem;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.hero-bg::before{
  content:'';
  position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.4;pointer-events:none;z-index:0;
}
.hero-bg::after{
  content:'';
  position:absolute;
  bottom:-2px;left:0;right:0;height:64px;
  background:var(--bg);
  border-radius:50% 50% 0 0 / 64px 64px 0 0;
  z-index:1;
}
.hero-content{position:relative;z-index:2;}

.hero-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:50px;
  padding:5px 14px;
  font-size:0.7rem;font-weight:600;
  letter-spacing:0.08em;text-transform:uppercase;
  color:rgba(255,255,255,0.75);
  margin-bottom:1.2rem;
  animation:fadeUp 0.6s var(--ease-out) both;
}
.hero-pill-dot{
  width:6px;height:6px;
  border-radius:50%;
  background:var(--acento);
  animation:pulse-ring 2s infinite;
}

.hero-h1{
  font-family:var(--font-display);
  font-size:clamp(2rem,8vw,3rem);
  font-weight:900;
  line-height:1.1;
  letter-spacing:-0.03em;
  color:#fff;
  margin-bottom:1rem;
  animation:fadeUp 0.6s 0.1s var(--ease-out) both;
}
.hero-h1 em{
  font-style:italic;
  font-weight:300;
  color:rgba(255,255,255,0.65);
}
.hero-h1 .accent{
  position:relative;
  display:inline-block;
}
.hero-h1 .accent::after{
  content:'';
  position:absolute;
  bottom:-2px;left:0;right:0;
  height:3px;
  background:var(--acento);
  border-radius:2px;
}

.hero-sub{
  font-size:0.88rem;
  color:rgba(255,255,255,0.5);
  line-height:1.7;
  margin-bottom:2rem;
  max-width:280px;
  margin-left:auto;margin-right:auto;
  animation:fadeUp 0.6s 0.2s var(--ease-out) both;
}

.hero-btns{
  display:flex;gap:10px;justify-content:center;flex-wrap:wrap;
  position:relative;z-index:1;
  animation:fadeUp 0.6s 0.3s var(--ease-out) both;
}
.btn-hero-p{
  background:#fff;color:#0D0C0A;
  border:none;border-radius:50px;
  padding:13px 28px;
  font-size:0.88rem;font-weight:700;
  cursor:pointer;
  font-family:var(--font-ui);
  letter-spacing:0.01em;
  transition:transform 0.2s var(--ease-spring),box-shadow 0.2s;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
.btn-hero-p:hover{transform:scale(1.05) translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.4);}
.btn-hero-p:active{transform:scale(0.97);}
.btn-hero-o{
  background:transparent;color:rgba(255,255,255,0.8);
  border:1.5px solid rgba(255,255,255,0.2);
  border-radius:50px;
  padding:12px 28px;
  font-size:0.88rem;font-weight:600;
  cursor:pointer;
  font-family:var(--font-ui);
  transition:transform 0.2s var(--ease-spring),background 0.2s,border-color 0.2s;
}
.btn-hero-o:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.4);transform:scale(1.03);}

.hero-stats{
  display:flex;
  margin:2rem 1.2rem 0;
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--sombra-lg);
  overflow:hidden;
  border:1px solid var(--border);
  animation:scaleIn 0.5s 0.4s var(--ease-spring) both;
}
.stat-item{
  flex:1;
  padding:1.3rem 0.5rem;
  text-align:center;
  border-right:1px solid var(--cinza-cla);
  position:relative;
}
.stat-item:last-child{border-right:none;}
.stat-num{
  font-family:var(--font-display);
  font-size:1.6rem;
  font-weight:700;
  color:var(--preto);
  line-height:1;
  margin-bottom:4px;
}
.stat-label{
  font-family:var(--font-mono);
  font-size:0.58rem;
  color:var(--cinza-med);
  letter-spacing:0.08em;
  text-transform:uppercase;
}

.hero-features{
  padding:1.5rem 1.2rem;
  display:flex;flex-direction:column;gap:0.6rem;
}
.feature-row{
  display:flex;gap:0.6rem;
  animation:fadeUp 0.6s var(--ease-out) both;
}
.feature-card{
  flex:1;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:1rem;
  display:flex;align-items:flex-start;gap:0.7rem;
  transition:transform 0.2s var(--ease-spring),box-shadow 0.2s;
}
.feature-card:hover{transform:translateY(-2px);box-shadow:var(--sombra);}
.feature-icon{
  font-size:1.3rem;
  width:38px;height:38px;
  background:var(--cinza-bg);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.feature-text h4{font-size:0.78rem;font-weight:700;color:var(--preto);margin-bottom:2px;}
.feature-text p{font-size:0.68rem;color:var(--cinza-med);line-height:1.4;}

#btn-instalar{
  display:none;
  width:calc(100% - 2.4rem);
  margin:0 1.2rem 1.2rem;
  background:var(--preto);color:var(--bg);
  border:none;border-radius:var(--radius);
  padding:14px;
  font-family:var(--font-ui);
  font-size:0.86rem;font-weight:600;
  cursor:pointer;
  align-items:center;justify-content:center;gap:8px;
  transition:transform 0.2s var(--ease-spring);
}
#btn-instalar.show{display:flex;}
#btn-instalar:hover{transform:scale(1.02);}

.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:0.9rem;}
label{font-size:0.72rem;font-weight:700;color:var(--preto);letter-spacing:0.04em;text-transform:uppercase;}

input,select,textarea{
  border:1.5px solid var(--cinza-cla);
  border-radius:var(--radius-sm);
  padding:12px 14px;
  font-size:0.9rem;
  font-family:var(--font-ui);
  color:var(--texto);
  background:var(--bg);
  outline:none;width:100%;
  -webkit-appearance:none;
  transition:border-color 0.2s,background 0.2s,box-shadow 0.2s;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--preto);
  background:var(--card);
  box-shadow:0 0 0 3px rgba(13,12,10,0.06);
}
[data-theme="dark"] input:focus,[data-theme="dark"] select:focus,[data-theme="dark"] textarea:focus{
  box-shadow:0 0 0 3px rgba(245,242,238,0.06);
}
textarea{resize:vertical;min-height:72px;}

.btn-full{
  width:100%;background:var(--preto);color:var(--bg);
  border:none;border-radius:50px;
  padding:14px;
  font-size:0.92rem;font-weight:700;
  cursor:pointer;font-family:var(--font-ui);
  margin-top:4px;letter-spacing:0.01em;
  transition:transform 0.2s var(--ease-spring),box-shadow 0.2s;
  box-shadow:0 4px 16px rgba(13,12,10,0.15);
}
.btn-full:hover{transform:scale(1.02) translateY(-1px);box-shadow:0 6px 24px rgba(13,12,10,0.2);}
.btn-full:active{transform:scale(0.97);}
.btn-full:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

.btn-full2{
  width:100%;background:transparent;
  color:var(--preto);border:1.5px solid var(--cinza-cla);
  border-radius:50px;padding:13px;
  font-size:0.88rem;font-weight:600;
  cursor:pointer;font-family:var(--font-ui);
  margin-top:6px;
  transition:transform 0.2s var(--ease-spring),background 0.2s;
}
.btn-full2:hover{background:var(--cinza-bg);}
.btn-p{
  background:var(--preto);color:var(--bg);
  border:none;border-radius:50px;
  padding:12px 26px;
  font-size:0.88rem;font-weight:600;
  cursor:pointer;font-family:var(--font-ui);
  transition:transform 0.2s var(--ease-spring);
}
.btn-p:hover{transform:scale(1.04);}
.btn-p:active{transform:scale(0.96);}
.btn-o{
  background:transparent;color:var(--preto);
  border:1.5px solid var(--cinza-cla);
  border-radius:50px;padding:11px 26px;
  font-size:0.88rem;font-weight:600;
  cursor:pointer;font-family:var(--font-ui);
  transition:transform 0.2s,background 0.2s;
}
.btn-o:hover{background:var(--cinza-bg);}

.divider{
  text-align:center;font-size:0.68rem;
  color:var(--cinza-med);
  margin:0.8rem 0;
  position:relative;
  font-family:var(--font-mono);
  letter-spacing:0.06em;
}
.divider::before,.divider::after{
  content:'';position:absolute;top:50%;
  width:38%;height:1px;background:var(--cinza-cla);
}
.divider::before{left:0;}.divider::after{right:0;}

.cupom-row{display:flex;gap:6px;}
.cupom-row input{flex:1;}
.btn-cupom{
  background:var(--preto);color:var(--bg);
  border:none;border-radius:var(--radius-sm);
  padding:12px 14px;
  font-size:0.76rem;font-weight:600;
  cursor:pointer;font-family:var(--font-ui);
  white-space:nowrap;
  transition:transform 0.15s var(--ease-spring);
}
.btn-cupom:hover{transform:scale(1.04);}

#tela-auth{background:var(--bg);}
.auth-card{
  background:var(--card);
  border-radius:var(--radius);
  padding:2rem 1.5rem;
  margin:1.2rem;
  box-shadow:var(--sombra-lg);
  border:1px solid var(--border);
  animation:scaleIn 0.5s var(--ease-spring) both;
}
.auth-logo{text-align:center;margin-bottom:0.4rem;}
.auth-logo-icon{font-size:2.4rem;animation:float 3s ease-in-out infinite;}
.auth-logo-text{
  font-family:var(--font-display);
  font-size:1.5rem;font-weight:700;
  color:var(--preto);letter-spacing:-0.03em;
}
.auth-sub{
  font-size:0.76rem;color:var(--cinza-med);
  text-align:center;margin-bottom:1.5rem;
  font-family:var(--font-mono);letter-spacing:0.04em;
}
.auth-tabs{
  display:flex;background:var(--cinza-bg);
  border-radius:50px;padding:4px;margin-bottom:1.4rem;
  border:1px solid var(--cinza-cla);
}
.auth-tab{
  flex:1;background:transparent;border:none;
  padding:9px;font-size:0.82rem;
  font-family:var(--font-ui);cursor:pointer;
  color:var(--cinza-med);border-radius:50px;
  font-weight:600;
  transition:background 0.2s,color 0.2s,transform 0.2s var(--ease-spring);
}
.auth-tab.active{
  background:var(--preto);color:var(--bg);
  transform:scale(1.02);
}

#tela-perfil{background:var(--bg);}
.perfil-hero{
  background:var(--card);
  border-bottom:1px solid var(--border);
  padding:1.5rem 1.2rem 1.2rem;
}
.perfil-top{display:flex;align-items:center;gap:1rem;margin-bottom:1rem;}
.perfil-avatar{
  width:76px;height:76px;border-radius:50%;
  border:3px solid var(--preto);
  cursor:pointer;
  background:var(--cinza-bg);
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;flex-shrink:0;overflow:hidden;
  box-shadow:0 4px 16px rgba(13,12,10,0.12);
  transition:transform 0.2s var(--ease-spring);
  position:relative;
}
.perfil-avatar::after{
  content:'✏️';
  position:absolute;inset:0;
  background:rgba(0,0,0,0.45);
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;
  opacity:0;
  transition:opacity 0.2s;
  border-radius:50%;
}
.perfil-avatar:hover{transform:scale(1.06);}
.perfil-avatar:hover::after{opacity:1;}
.perfil-avatar img{width:100%;height:100%;object-fit:cover;}

.perfil-nome{
  font-family:var(--font-display);
  font-size:1.25rem;font-weight:700;
  color:var(--preto);letter-spacing:-0.02em;
}
.perfil-modo{
  font-size:0.7rem;color:var(--cinza-med);
  margin-top:3px;
  font-family:var(--font-mono);
  letter-spacing:0.04em;
}
.perfil-stats{
  display:flex;gap:1.5rem;margin-top:0.6rem;
}
.pstat{text-align:left;}
.pstat-num{
  font-family:var(--font-display);
  font-size:1.1rem;font-weight:700;
  color:var(--preto);line-height:1;
}
.pstat-label{
  font-size:0.62rem;color:var(--cinza-med);
  font-family:var(--font-mono);
  letter-spacing:0.04em;margin-top:2px;
}
.perfil-bio{font-size:0.83rem;color:var(--cinza-med);margin-bottom:0.8rem;line-height:1.6;}

.perfil-cred-pill{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--cinza-bg);
  border:1px solid var(--cinza-cla);
  border-radius:50px;padding:5px 12px;
  font-size:0.7rem;color:var(--cinza-med);
  font-family:var(--font-mono);
}
.btn-editar-perfil{
  background:var(--cinza-bg);color:var(--preto);
  border:1px solid var(--cinza-cla);
  border-radius:50px;
  padding:8px 18px;
  font-size:0.78rem;font-weight:600;
  cursor:pointer;font-family:var(--font-ui);
  width:100%;margin-top:0.9rem;
  transition:transform 0.15s var(--ease-spring),background 0.2s;
  letter-spacing:0.02em;
}
.btn-editar-perfil:hover{background:var(--preto);color:var(--bg);}

.grafico-periodo-btn{
  background:var(--cinza-bg);border:1px solid var(--cinza-cla);
  border-radius:50px;padding:2px 10px;font-size:0.62rem;font-weight:700;
  font-family:var(--font-mono);color:var(--cinza-med);cursor:pointer;
  transition:all 0.2s;
}
.grafico-periodo-btn.active{
  background:var(--preto);color:var(--bg);border-color:var(--preto);
}
.grafico-card{
  background:var(--card);
  border-radius:var(--radius);
  padding:1.4rem 1.2rem;
  margin:1rem 1.2rem;
  box-shadow:var(--sombra);
  border:1px solid var(--border);
  animation:fadeUp 0.5s var(--ease-out) both;
}
.grafico-card-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1rem;
}
.grafico-card h3{
  font-family:var(--font-display);
  font-size:0.95rem;font-weight:700;
  color:var(--preto);
}
.grafico-badge{
  font-family:var(--font-mono);
  font-size:0.6rem;color:var(--cinza-med);
  background:var(--cinza-bg);
  border:1px solid var(--cinza-cla);
  border-radius:50px;padding:3px 10px;
  letter-spacing:0.06em;
}
.grafico-wrap{position:relative;height:140px;padding:8px 4px 4px;}
.grafico-empty{
  text-align:center;padding:2rem 0;
  font-size:0.78rem;color:var(--cinza-med);
  font-family:var(--font-mono);letter-spacing:0.04em;
}

.section-header{
  padding:1rem 1.2rem 0.6rem;
  display:flex;align-items:center;justify-content:space-between;
}
.section-title{
  font-size:0.78rem;font-weight:700;
  color:var(--preto);
  font-family:var(--font-mono);
  letter-spacing:0.06em;text-transform:uppercase;
}
.btn-ad{
  background:var(--preto);color:var(--bg);
  border:none;border-radius:50px;
  font-size:0.7rem;font-weight:600;
  cursor:pointer;padding:5px 13px;
  font-family:var(--font-ui);
  transition:transform 0.15s var(--ease-spring);
}
.btn-ad:hover{transform:scale(1.06);}

.posts-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:3px;margin:0 1.2rem;
}
.post-thumb{
  aspect-ratio:1;background:var(--cinza-bg);
  border-radius:10px;overflow:hidden;
  cursor:pointer;position:relative;
  transition:transform 0.2s var(--ease-spring);
}
.post-thumb:active{transform:scale(0.92);}
.post-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.post-thumb-empty{
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;
}
.post-thumb-info{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,0.75));
  padding:7px 7px 6px;
  font-size:0.6rem;color:#fff;font-weight:700;
  font-family:var(--font-mono);letter-spacing:0.04em;
}
.post-thumb-badge{
  position:absolute;top:6px;left:6px;
  background:rgba(0,0,0,0.6);
  color:#fff;border-radius:50px;
  padding:2px 7px;font-size:0.52rem;font-weight:700;
  font-family:var(--font-mono);letter-spacing:0.04em;
  backdrop-filter:blur(4px);
}

.adp-banner{
  margin:0.8rem 1.2rem;
  background:linear-gradient(135deg,#0D0C0A 0%,#2A2420 100%);
  border-radius:var(--radius);
  padding:1.1rem 1.3rem;
  cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
  border:1px solid rgba(255,255,255,0.06);
  transition:transform 0.2s var(--ease-spring),box-shadow 0.2s;
  box-shadow:0 6px 24px rgba(13,12,10,0.2);
  position:relative;overflow:hidden;
}
.adp-banner::before{
  content:'';
  position:absolute;
  top:-40px;right:-40px;
  width:120px;height:120px;
  background:radial-gradient(circle,rgba(200,67,42,0.2) 0%,transparent 70%);
  pointer-events:none;
}
.adp-banner:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(13,12,10,0.3);}
.adp-banner:active{transform:scale(0.98);}
.adp-banner-icon{font-size:1.8rem;animation:float 3s ease-in-out infinite;}
.adp-banner-text h4{font-size:0.92rem;font-weight:700;color:#fff;margin-bottom:3px;}
.adp-banner-text p{font-size:0.7rem;color:rgba(255,255,255,0.5);font-family:var(--font-mono);letter-spacing:0.04em;}
.adp-banner-cta{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:50px;
  padding:7px 15px;
  font-size:0.72rem;color:#fff;font-weight:700;
  white-space:nowrap;flex-shrink:0;
  font-family:var(--font-ui);letter-spacing:0.02em;
}

.ad-card-wrapper{
  background:var(--card);
  border-radius:var(--radius);
  margin:0.8rem 1.2rem;
  box-shadow:var(--sombra);
  border:1px solid var(--border);
  overflow:hidden;
  animation:scaleIn 0.3s var(--ease-spring) both;
}
.ad-card-header{
  padding:1.1rem 1.2rem 0.6rem;
  display:flex;align-items:center;justify-content:space-between;
}
.ad-card-title{
  font-family:var(--font-display);
  font-size:1rem;font-weight:700;color:var(--preto);
}
.ad-close-btn{
  background:var(--cinza-bg);border:1px solid var(--cinza-cla);
  border-radius:50%;width:28px;height:28px;
  font-size:0.8rem;color:var(--cinza-med);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.2s var(--ease-spring);
}
.ad-close-btn:hover{transform:rotate(90deg);}
.ad-card-sub{font-size:0.74rem;color:var(--cinza-med);padding:0 1.2rem 0.9rem;line-height:1.5;}
.ad-sels{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;padding:0 1.2rem 0.9rem;}
.ad-sel-label{
  font-size:0.62rem;font-weight:700;
  color:var(--cinza-med);
  letter-spacing:0.1em;text-transform:uppercase;
  margin-bottom:0.4rem;
  font-family:var(--font-mono);
}
.ad-sel-box{
  background:var(--cinza-bg);
  border-radius:var(--radius-sm);
  border:2px dashed var(--cinza-cla);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;
  transition:border-color 0.2s,transform 0.2s var(--ease-spring);
  aspect-ratio:1;
}
.ad-sel-box:hover{border-color:var(--preto);transform:scale(1.02);}
.ad-sel-box img{width:100%;height:100%;object-fit:cover;}
.ad-add-icon{font-size:1.8rem;opacity:0.3;}
.ad-data-label{font-size:0.6rem;color:var(--cinza-med);text-align:center;margin-top:4px;min-height:16px;font-family:var(--font-mono);}
.ad-comp-wrap{margin:0 1.2rem 0.9rem;}
.ad-comparador{
  position:relative;aspect-ratio:1;
  border-radius:var(--radius-sm);
  overflow:hidden;user-select:none;
}
.ad-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.ad-img-depois{clip-path:inset(0 50% 0 0);}
.ad-divider{
  position:absolute;top:0;bottom:0;left:50%;
  width:3px;background:#fff;
  cursor:ew-resize;z-index:10;
  box-shadow:0 0 12px rgba(0,0,0,0.4);
}
.ad-divider-handle{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:#fff;border-radius:50%;
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  font-size:0.78rem;font-weight:700;
  box-shadow:0 2px 12px rgba(0,0,0,0.3);color:#333;
}
.ad-label{
  position:absolute;bottom:10px;
  background:rgba(0,0,0,0.65);color:#fff;
  border-radius:50px;padding:3px 10px;
  font-size:0.6rem;font-weight:700;
  letter-spacing:0.08em;
  font-family:var(--font-mono);
  backdrop-filter:blur(4px);
}
.ad-compare-hint{
  font-size:0.65rem;color:var(--cinza-med);
  text-align:center;margin-top:6px;
  font-family:var(--font-mono);
}
.ad-legenda-wrap{padding:0 1.2rem 0.9rem;}
.ad-legenda-wrap input{border-radius:var(--radius-xs);}
.ad-actions{display:flex;gap:0.5rem;padding:0 1.2rem 1.2rem;}
.ad-btn-priv{
  flex:1;background:var(--cinza-bg);color:var(--preto);
  border:1.5px solid var(--cinza-cla);
  border-radius:50px;padding:12px;
  font-size:0.82rem;font-weight:600;
  cursor:pointer;font-family:var(--font-ui);
  transition:transform 0.15s var(--ease-spring);
}
.ad-btn-priv:hover{transform:scale(1.03);}
.ad-btn-pub{
  flex:1;background:var(--preto);color:var(--bg);
  border:none;border-radius:50px;padding:12px;
  font-size:0.82rem;font-weight:700;
  cursor:pointer;font-family:var(--font-ui);
  transition:transform 0.15s var(--ease-spring),box-shadow 0.15s;
  box-shadow:0 4px 14px rgba(13,12,10,0.2);
}
.ad-btn-pub:hover{transform:scale(1.03);box-shadow:0 6px 20px rgba(13,12,10,0.3);}
.ad-btn-priv:disabled,.ad-btn-pub:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

.privados-section{padding:0.8rem 1.2rem 0.5rem;}
.privados-section h4{
  font-size:0.7rem;font-weight:700;
  color:var(--cinza-med);
  margin-bottom:0.5rem;
  font-family:var(--font-mono);
  letter-spacing:0.08em;text-transform:uppercase;
}

#tela-feed{background:var(--bg);}
.feed-header{
  background:var(--card);
  padding:1rem 1.2rem;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.feed-header h2{
  font-family:var(--font-display);
  font-size:1.15rem;font-weight:700;
  color:var(--preto);letter-spacing:-0.02em;
}
.feed-header-badge{
  font-size:0.68rem;color:var(--cinza-med);
  font-family:var(--font-mono);
}
.feed-post{
  background:var(--card);
  margin-bottom:0.7rem;
  border-bottom:1px solid var(--border);
  animation:fadeUp 0.4s var(--ease-out) both;
  overflow:hidden;
  width:100%;
  max-width:100%;
  contain:layout;
}
.feed-post-header{
  display:flex;align-items:center;gap:0.8rem;
  padding:0.9rem 1.2rem 0.6rem;
}
.feed-post-avatar{
  width:38px;height:38px;border-radius:50%;
  background:var(--cinza-bg);
  overflow:hidden;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:0.9rem;color:var(--preto);
  border:2px solid var(--border);
}
.feed-post-avatar img{width:100%;height:100%;object-fit:cover;}
.feed-post-user{font-weight:700;font-size:0.84rem;color:var(--preto);}
.feed-post-data{font-size:0.62rem;color:var(--cinza-med);font-family:var(--font-mono);}
.feed-post-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
.feed-post-img-placeholder{
  width:100%;aspect-ratio:1;
  background:var(--cinza-bg);
  display:flex;align-items:center;justify-content:center;
  font-size:3rem;
}
.feed-post-body{padding:0.9rem 1.2rem;}
.feed-post-peso{
  font-family:var(--font-display);
  font-size:1.1rem;font-weight:700;
  color:var(--preto);margin-bottom:0.3rem;
}
.feed-post-nota{font-size:0.84rem;color:var(--texto);line-height:1.6;margin-bottom:0.5rem;}
.feed-post-actions{
  display:flex;gap:1rem;padding:0 1.2rem 0.6rem;
  border-top:1px solid var(--cinza-bg);padding-top:0.6rem;
}
.feed-action-btn{
  background:none;border:none;
  font-size:0.82rem;color:var(--cinza-med);
  cursor:pointer;font-family:var(--font-ui);
  display:flex;align-items:center;gap:4px;
  transition:color 0.15s,transform 0.2s var(--ease-spring);
}
.feed-action-btn:hover{transform:scale(1.08);}
.feed-action-btn.ativo{color:var(--preto);font-weight:700;}
.comentarios-section{padding:0 1.2rem 0.9rem;}
.comentario-item{display:flex;gap:0.5rem;margin-bottom:0.5rem;align-items:flex-start;}
.comentario-avatar{
  width:28px;height:28px;border-radius:50%;
  background:var(--cinza-bg);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:0.7rem;font-weight:700;color:var(--preto);
}
.comentario-body{
  flex:1;background:var(--cinza-bg);
  border-radius:var(--radius-xs);
  padding:0.4rem 0.8rem;
}
.comentario-user{font-size:0.72rem;font-weight:700;color:var(--preto);}
.comentario-txt{font-size:0.78rem;color:var(--texto);line-height:1.4;}
.comentario-del{background:none;border:none;color:var(--cinza-med);font-size:0.7rem;cursor:pointer;margin-left:auto;}
.add-comentario{display:flex;gap:6px;padding:0 1.2rem 0.9rem;}
.add-comentario input{flex:1;padding:9px 12px;font-size:0.82rem;}
.add-comentario button{
  background:var(--preto);color:var(--bg);
  border:none;border-radius:var(--radius-xs);
  padding:9px 14px;font-size:0.76rem;
  cursor:pointer;font-family:var(--font-ui);
  white-space:nowrap;font-weight:600;
  transition:transform 0.15s var(--ease-spring);
}
.add-comentario button:hover{transform:scale(1.04);}

#tela-progresso{background:var(--bg);}
.prog-header{
  padding:1rem 1.2rem 0;
  display:flex;align-items:center;justify-content:space-between;
}
.prog-title{
  font-family:var(--font-display);
  font-size:1.1rem;font-weight:700;
  color:var(--preto);letter-spacing:-0.02em;
}
.prog-form-card{
  background:var(--card);
  border-radius:var(--radius);
  padding:1.4rem 1.2rem;
  margin:0.8rem 1.2rem;
  box-shadow:var(--sombra);
  border:1px solid var(--border);
  animation:scaleIn 0.4s var(--ease-spring) both;
}

.foto-upload-area{
  border:2px dashed var(--cinza-cla);
  border-radius:var(--radius-sm);
  padding:1.8rem;
  text-align:center;cursor:pointer;
  margin-bottom:0.9rem;
  position:relative;overflow:hidden;
  transition:border-color 0.2s,background 0.2s;
}
.foto-upload-area:hover{border-color:var(--preto);background:var(--cinza-bg);}
.foto-upload-area.tem-foto{border-color:var(--preto);padding:0;}
.foto-upload-area img{width:100%;border-radius:var(--radius-sm);display:block;}
.foto-upload-icon{font-size:2.2rem;margin-bottom:0.5rem;}
.foto-upload-txt{font-size:0.76rem;color:var(--cinza-med);font-family:var(--font-mono);}

.pub-toggle{
  display:flex;align-items:center;gap:8px;
  font-size:0.76rem;color:var(--cinza-med);
  margin-bottom:0.9rem;cursor:pointer;
}
.pub-toggle input{width:auto;accent-color:var(--preto);cursor:pointer;}
.pub-toggle label{cursor:pointer;font-weight:500;text-transform:none;letter-spacing:0;color:var(--cinza-med);}

#tela-modo{background:var(--bg);}
.modo-header{
  padding:1.4rem 1.2rem 0.9rem;text-align:center;
}
.modo-title{
  font-family:var(--font-display);
  font-size:1.6rem;font-weight:900;
  color:var(--preto);margin-bottom:0.3rem;
  letter-spacing:-0.03em;
}
.modo-sub{font-size:0.8rem;color:var(--cinza-med);font-family:var(--font-mono);}
.modos-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:0.8rem;padding:0 1.2rem 1rem;
}
.modo-card{
  position:relative;border-radius:var(--radius);
  overflow:hidden;cursor:pointer;
  aspect-ratio:3/4;
  border:3px solid transparent;
  transition:transform 0.2s var(--ease-spring),box-shadow 0.2s;
  box-shadow:var(--sombra);
}
.modo-card:hover{transform:scale(1.02);}
.modo-card:active{transform:scale(0.97);}
.modo-card.selected{
  border-color:#fff;
  box-shadow:0 0 0 3px var(--preto),var(--sombra-lg);
}
.modo-card img{width:100%;height:100%;object-fit:cover;display:block;}
.modo-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.1) 60%,transparent 100%);
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:1rem;
}
.modo-tag{
  font-size:0.55rem;font-weight:700;
  letter-spacing:0.15em;text-transform:uppercase;
  color:rgba(255,255,255,0.55);margin-bottom:4px;
  font-family:var(--font-mono);
}
.modo-nome{
  font-family:var(--font-display);
  font-size:1.1rem;font-weight:900;
  color:#fff;line-height:1.15;
}
.modo-desc{font-size:0.65rem;color:rgba(255,255,255,0.65);margin-top:4px;line-height:1.4;}
.modo-check{
  position:absolute;top:10px;right:10px;
  width:26px;height:26px;border-radius:50%;
  background:var(--preto);color:#fff;
  display:none;align-items:center;justify-content:center;
  font-size:0.75rem;font-weight:700;
  border:2px solid #fff;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.modo-card.selected .modo-check{display:flex;animation:scaleIn 0.3s var(--ease-spring) both;}
.modo-footer{padding:0 1.2rem 1.5rem;display:flex;gap:0.8rem;}

#tela-planos{background:var(--bg);}
.sec-header{padding:1.3rem 1.2rem 0.9rem;text-align:center;}
.sec-title{
  font-family:var(--font-display);
  font-size:1.5rem;font-weight:900;
  color:var(--preto);margin-bottom:0.2rem;
  letter-spacing:-0.03em;
}
.sec-sub{font-size:0.78rem;color:var(--cinza-med);font-family:var(--font-mono);}
.planos-lista{padding:0 1.2rem;}
.plano-card{
  background:var(--card);
  border:2px solid var(--cinza-cla);
  border-radius:var(--radius);
  padding:1.4rem;margin-bottom:0.9rem;
  cursor:pointer;position:relative;
  transition:transform 0.2s var(--ease-spring),border-color 0.2s,box-shadow 0.2s;
  box-shadow:var(--sombra);
}
.plano-card:hover{transform:translateY(-2px);box-shadow:var(--sombra-lg);}
.plano-card.selected{
  border-color:var(--preto);
  box-shadow:0 0 0 1px var(--preto),var(--sombra);
}
.plano-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.8rem;}
.plano-chip{
  font-size:0.6rem;font-weight:700;
  background:var(--cinza-bg);color:var(--cinza-med);
  border-radius:50px;padding:3px 10px;
  text-transform:uppercase;letter-spacing:0.1em;
  font-family:var(--font-mono);
  border:1px solid var(--cinza-cla);
}
.plano-sel{
  width:22px;height:22px;border-radius:50%;
  background:var(--cinza-bg);
  border:2px solid var(--cinza-cla);
  display:flex;align-items:center;justify-content:center;
  font-size:0.65rem;color:transparent;
  transition:background 0.2s,border-color 0.2s,transform 0.2s var(--ease-spring);
}
.plano-card.selected .plano-sel{
  background:var(--preto);border-color:var(--preto);color:#fff;
  transform:scale(1.1);
}
.plano-nome{
  font-family:var(--font-display);
  font-size:1.15rem;font-weight:700;
  color:var(--preto);margin-bottom:0.3rem;
}
.plano-preco{
  font-family:var(--font-display);
  font-size:1.8rem;font-weight:900;
  color:var(--preto);margin-bottom:0.7rem;
  letter-spacing:-0.04em;

footer{

async function ativarNotif(){
  document.getElementById('notif-banner').classList.remove('show');
  if(!('Notification' in window))return;
  const p=await Notification.requestPermission();
  if(p==='granted'){toast('✅ Notificações ativadas!');ls.set('notif_ok',true);}
}

async function api(path,method='GET',body=null){
  const token=ls.get('auth_token');
  const headers={'Content-Type':'application/json'};
  if(token) headers['Authorization']='Bearer '+token;
  const opts={method,headers};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(path,opts);
  const text=await r.text();
  if(r.status===401){
    ls.set('session',null);ls.set('auth_token',null);
    USER=null;atualizaNav();irHero();
    throw new Error('Sessão expirada. Faça login novamente.');
  }
  try{return JSON.parse(text);}
  catch(e){
    console.error('API error',path,r.status,text.substring(0,200));
    if(r.status===500)throw new Error('Erro interno do servidor.');
    throw new Error('Resposta inválida: '+text.substring(0,100));
  }
}

  document.querySelectorAll('[id^="tela-"]').forEach(t=>t.classList.remove('ativa'));

  window.scrollTo({top:0,behavior:'smooth'});
}

(function(){
  const email=ls.get('session');if(!email)return;
  if(email===ADMIN_EMAIL){
    USER={nome:'Admin MFCT',email:ADMIN_EMAIL,is_admin:true,creditos:999999,id:'admin'};
    ls.set('auth_token','admin-token-fake');
    atualizaNav();irAdmin();return;

  const tokenSalvo = ls.get('auth_token');
  if(!tokenSalvo){

  api('/api/usuarios?action=buscar&email='+encodeURIComponent(email))

})();

function authTab(tab,el){
  document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));

}

async function fazerLogin(){
  const email=document.getElementById('le').value.trim().toLowerCase();
  const senha=document.getElementById('ls').value;
  if(!email||!senha){toast('Preencha e-mail e senha');return;}
  
  // ADMIN - login direto sem API
  if(email===ADMIN_EMAIL&&senha===ADMIN_SENHA){
    USER={nome:'Admin MFCT',email:ADMIN_EMAIL,is_admin:true,creditos:999999,id:'admin'};
    ls.set('session',email);
    ls.set('auth_token','admin-token-fake'); // ← IMPORTANTE!
    atualizaNav();
    toast('Bem-vindo, Admin! 👑');
    setTimeout(()=>irAdmin(),300);
    return;
  }
  
  try{
    const u=await api('/api/usuarios?action=login','POST',{email,senha});
    if(u.error){toast(u.error);return;}
    USER=u;ls.set('session',email);
    if(u.token)ls.set('auth_token',u.token);
    atualizaNav();
    toast('Bem-vindo, '+u.nome.split(' ')[0]+'! 👋');
    setTimeout(()=>irPerfil(),300);
  }catch(e){toast('Erro ao conectar. Tente novamente.');}
}

async function carregaAdmin(){
  // Admin não precisa carregar dados reais da API
  if(USER?.id === 'admin'){
    TODOS_USUARIOS = [];
    document.getElementById('adm-nu').textContent = '0';
    document.getElementById('adm-nc').textContent = '0';
    document.getElementById('adm-posts').textContent = '0';
    document.getElementById('adm-planos').textContent = '0';
    renderUsuariosAdmin([]);
    renderCuponsAdmin([]);
    return;
  }
  
  try{
    const users=await api('/api/usuarios?action=listar');
    TODOS_USUARIOS=users||[];
    document.getElementById('adm-nu').textContent=TODOS_USUARIOS.length;
    renderUsuariosAdmin(TODOS_USUARIOS);
    const cupons=await api('/api/cupons?action=listar');
    renderCuponsAdmin(cupons||[]);
    document.getElementById('adm-nc').textContent=(cupons||[]).filter(c=>c.ativo).length;
  }catch(e){
    console.error('Erro carregar admin:', e);
  }
}

function toast(msg){
  const t=document.getElementById('toast');
  t.classList.remove('show');
  clearTimeout(t._timeout);
  void t.offsetWidth;
  t.textContent=msg;
  t.classList.add('show');
  t._timeout=setTimeout(()=>{t.classList.remove('show');},3500);
}
